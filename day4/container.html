<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!-- Div Container - It is a Box in which we can add The Content Using Any Html Tag
      It ALWAYS Take 100% width - full Width By default
      Block Level Element(Tag) 
-->
    <div style="background-color: bisque;width: 220px;  ">
     <h2>Review</h2>
     <h3>Ojas</h3>
     <p>Everything is Good⭐⭐⭐⭐</p>
    </div>


    <div style="background-color: chocolate;width: 220px; ">
        <h2>Support</h2>
        <p>Support@gmail</p>
        <p>+91 1234567</p>
        <p>Location. XYZ📍</p>
    </div>


    <!-- SPAN Tag
     It Only Takes Required Amount of width as per content 
     Inline Element(Tag)
     It can fit inisde any HTML tag 
    -->

     <p> <span style="background-color: blanchedalmond;">Good Eveing ⭐</span>  Suresh</p>

     <button>Cart 0</button>
     <button>Cart <span>0</span></button>

</body>
</html>
